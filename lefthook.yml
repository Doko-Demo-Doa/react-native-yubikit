pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: npx oxlint {staged_files}

    format:
      glob: '*.{js,ts,jsx,tsx,json,md}'
      run: npx oxfmt --check {staged_files}

    types:
      glob: '*.{js,ts, jsx, tsx}'
      run: npx tsc
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit
